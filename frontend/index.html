<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Time Diff Calculator</title>
    <link href="/main.css" rel="stylesheet"/>
</head>
<body>
<header class="header">
    <h1 id="appTitle">Time Diff Calculator</h1>
    <p class="subtitle" id="appSubtitle">Enter two date-times in one field (detected automatically).</p>
</header>

<main class="layout">
    <section class="panel input-panel">
        <label class="label" for="datetimeInput" id="lblInput">Date-time input</label>
        <textarea id="datetimeInput" class="textarea" rows="2" spellcheck="false"
                  placeholder="Example: 03-21 00:59:24 03-21 01:06:28"></textarea>
        <div class="row">
            <button type="button" class="btn primary" id="btnCalc">Calculate</button>
            <span class="validation" id="validation" role="status"></span>
        </div>
    </section>

    <section class="panel results-panel">
        <h2 id="lblResults">Results</h2>
        <ul class="results" id="results"></ul>
    </section>

    <section class="panel settings-panel">
        <h2 id="lblSettings">Settings</h2>

        <fieldset class="fieldset">
            <legend id="lblFormats">Output formats</legend>
            <div class="checks-grid">
                <label class="check"><input type="checkbox" data-fmt="seconds"/> <span id="t_seconds">Seconds</span></label>
                <label class="check"><input type="checkbox" data-fmt="milliseconds"/> <span id="t_milliseconds">Milliseconds</span></label>
                <label class="check"><input type="checkbox" data-fmt="mmss"/> <span id="t_mmss">mm:ss</span></label>
                <label class="check"><input type="checkbox" data-fmt="hhmmss"/> <span id="t_hhmmss">hh:mm:ss</span></label>
                <label class="check"><input type="checkbox" data-fmt="ddhhmmss"/> <span id="t_ddhhmmss">dd hh:mm:ss</span></label>
                <label class="check"><input type="checkbox" data-fmt="full"/> <span id="t_full">Full</span></label>
                <label class="check"><input type="checkbox" data-fmt="custom"/> <span id="t_custom">Custom format</span></label>
            </div>
        </fieldset>

        <label class="check settings-extra">
            <input type="checkbox" id="zeroPadding" checked/>
            <span id="lblZeroPadding">Zero-padding (hh, mm, ss, ms)</span>
        </label>

        <label class="label" for="customFormat" id="lblCustom">Custom format string</label>
        <input type="text" id="customFormat" class="input" placeholder="{dd}d {hh}:{mm}:{ss}.{ms}"/>

        <label class="label" for="language" id="lblLanguage">Language</label>
        <select id="language" class="select">
            <option value="auto">Auto (OS)</option>
            <option value="ko">한국어</option>
            <option value="en">English</option>
        </select>
    </section>
</main>

<script type="module" src="/main.js"></script>
</body>
</html>
